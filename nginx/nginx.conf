load_module /usr/lib/nginx/modules/otel_ngx_module.so;

user nginx;
worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  opentelemetry on;
  opentelemetry_service_name nginx;
  opentelemetry_otlp_traces_endpoint http://jaeger:4318/v1/traces;
  opentelemetry_trust_incoming_spans on;
  opentelemetry_attribute "nginx.request_id" "$request_id_safe";
  opentelemetry_ignore_paths "^/nginx_status$";

  map $http_x_request_id $request_id_safe {
    default $http_x_request_id;
    "" $request_id;
  }

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30;
  keepalive_requests 1000;
  types_hash_max_size 4096;
  server_tokens off;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 15s;
  reset_timedout_connection on;

  client_max_body_size 2m;

  log_format json escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"service":"nginx",'
    '"remote_addr":"$remote_addr",'
    '"request_id":"$request_id_safe",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"referrer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"forwarded_for":"$http_x_forwarded_for"'
  '}';

  access_log /var/log/nginx/access.log json;
  error_log /var/log/nginx/error.log warn;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m inactive=7d max_size=1g;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;

  upstream frontend_upstream {
    server frontend:3000;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_next/static/ {
      opentelemetry_operation_name "nginx static";
      opentelemetry_propagate;
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id_safe;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_connect_timeout 2s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
      proxy_cache static_cache;
      proxy_cache_valid 200 7d;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    location /api/ {
      opentelemetry_operation_name "nginx api";
      opentelemetry_propagate;
      limit_req zone=api_limit burst=240 nodelay;
      proxy_intercept_errors on;
      error_page 502 = @api_bad_gateway;
      error_page 503 = @api_service_unavailable;
      error_page 504 = @api_gateway_timeout;
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id_safe;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Connection "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
    }

    location @api_bad_gateway {
      default_type application/json;
      return 502 '{"error":{"code":"NGINX_BAD_GATEWAY","message":"upstream service is unavailable","status":502}}';
    }

    location @api_service_unavailable {
      default_type application/json;
      return 503 '{"error":{"code":"NGINX_SERVICE_UNAVAILABLE","message":"upstream service is temporarily unavailable","status":503}}';
    }

    location @api_gateway_timeout {
      default_type application/json;
      return 504 '{"error":{"code":"NGINX_GATEWAY_TIMEOUT","message":"upstream service timed out","status":504}}';
    }

    location / {
      opentelemetry_operation_name "nginx web";
      opentelemetry_propagate;
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id_safe;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Connection "";
      proxy_connect_timeout 2s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
    }

    location = /nginx_status {
      opentelemetry off;
      stub_status;
      access_log off;
      allow 127.0.0.1;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
    }
  }
}