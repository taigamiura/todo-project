global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: nginx-exporter
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: frontend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - frontend:3000

  - job_name: bff
    metrics_path: /metrics
    static_configs:
      - targets:
          - bff:8080

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:8081

  - job_name: todo-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - todo-service:8082
