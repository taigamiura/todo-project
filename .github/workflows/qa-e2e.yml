name: Web App E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/qa-e2e.yml
      - compose.yml
      - compose.mock.yml
      - nginx/**
      - observability/**
      - bff/**
      - todo-service/**
      - user-service/**
      - todo-app/**
      - openapi/**
  pull_request:
    paths:
      - .github/workflows/qa-e2e.yml
      - compose.yml
      - compose.mock.yml
      - nginx/**
      - observability/**
      - bff/**
      - todo-service/**
      - user-service/**
      - todo-app/**
      - openapi/**

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: todo-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: todo-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: todo-app
        run: npx playwright install --with-deps chromium

      - name: Prepare environment file
        run: |
          cat <<'EOF' > .env
          APP_SESSION_SECRET=ci-session-secret
          USER_DB_PASSWORD=ci-user-db-pass
          TODO_DB_PASSWORD=ci-todo-db-pass
          HTTP_PORT=8080
          HTTPS_PORT=8443
          GRAFANA_ADMIN_PASSWORD=ci-grafana-pass
          EOF

      - name: Start docker compose stack
        run: docker compose -f compose.yml up -d --build --wait

      - name: Wait for HTTPS edge to respond
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --insecure https://localhost:8443/login > /dev/null; then
              exit 0
            fi

            echo "Waiting for app readiness... ($attempt/30)"
            sleep 5
          done

          echo "App did not become ready in time" >&2
          docker compose -f compose.yml logs --no-color
          exit 1

      - name: Run Playwright E2E
        working-directory: todo-app
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://localhost:8443
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            todo-app/playwright-report
            todo-app/test-results
          if-no-files-found: ignore

      - name: Print compose logs on failure
        if: failure()
        run: docker compose -f compose.yml logs --no-color

      - name: Stop docker compose stack
        if: always()
        run: docker compose -f compose.yml down -v
