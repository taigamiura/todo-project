name: Dependabot Rebase

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-rebase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebase:
    runs-on: ubuntu-latest

    steps:
      - name: Rebase behind Dependabot PRs
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            const oneDayMs = 24 * 60 * 60 * 1000;

            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const dependabotPulls = pullRequests.filter((pullRequest) => {
              return pullRequest.user?.login === 'dependabot[bot]';
            });

            for (const pullRequest of dependabotPulls) {
              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullRequest.number,
              });

              if (pr.data.mergeable_state !== 'behind') {
                core.info(`Skipping PR #${pullRequest.number}: mergeable_state=${pr.data.mergeable_state}`);
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullRequest.number,
                per_page: 100,
              });

              const recentlyRequested = comments.some((comment) => {
                const isBotComment = comment.user?.login === 'github-actions[bot]';
                const isRebaseRequest = comment.body?.trim() === '@dependabot rebase';
                const createdAt = Date.parse(comment.created_at);
                return isBotComment && isRebaseRequest && Number.isFinite(createdAt) && now - createdAt < oneDayMs;
              });

              if (recentlyRequested) {
                core.info(`Skipping PR #${pullRequest.number}: rebase already requested in the last 24 hours.`);
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullRequest.number,
                body: '@dependabot rebase',
              });

              core.info(`Requested rebase for PR #${pullRequest.number}.`);
            }
