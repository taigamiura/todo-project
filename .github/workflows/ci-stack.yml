name: Stack CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: stack-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment file
        run: |
          cat <<'EOF' > .env
          APP_SESSION_SECRET=ci-session-secret
          USER_DB_PASSWORD=ci-user-db-pass
          TODO_DB_PASSWORD=ci-todo-db-pass
          HTTP_PORT=8080
          HTTPS_PORT=8443
          GRAFANA_ADMIN_PASSWORD=ci-grafana-pass
          EOF

      - name: Validate compose.yml
        run: docker compose -f compose.yml config -q

      - name: Validate compose.mock.yml
        run: docker compose -f compose.mock.yml config -q

      - name: Validate nginx configuration
        run: |
          docker compose run --no-deps --rm nginx \
            /bin/sh -lc 'echo "127.0.0.1 frontend" >> /etc/hosts && /nginx/sbin/nginx -t -c /etc/nginx/nginx.conf'
