name: User Service CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/user-service-ci.yml
      - user-service/**
      - openapi/user-service.yaml
  pull_request:
    paths:
      - .github/workflows/user-service-ci.yml
      - user-service/**
      - openapi/user-service.yaml

permissions:
  contents: read

concurrency:
  group: user-service-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: user-service/go.mod
          cache-dependency-path: user-service/go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
