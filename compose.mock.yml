services:
  bff-mock:
    image: stoplight/prism:5
    command:
      - mock
      - -m
      - "false"
      - -h
      - 0.0.0.0
      - -p
      - "8080"
      - /tmp/openapi/bff.yaml
    volumes:
      - ./openapi:/tmp/openapi:ro
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 2s
      timeout: 2s
      retries: 30

