services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:80"
      - "127.0.0.1:${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - public
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./todo-app
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BFF_BASE_URL: http://bff:8080
      BFF_REQUEST_TIMEOUT_MS: 4000
      APP_SESSION_SECRET: ${APP_SESSION_SECRET}
      OTEL_SERVICE_NAME: todo-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      bff:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - public
      - private
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      APP_SESSION_SECRET: ${APP_SESSION_SECRET}
      USER_SERVICE_URL: http://user-service:8081
      TODO_SERVICE_URL: http://todo-service:8082
      REDIS_ADDR: redis:6379
      CACHE_TTL: 30s
      APP_ENV: production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      todo-service:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - private
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgres://todo_user:${USER_DB_PASSWORD}@user-db:5432/users?sslmode=disable
      APP_ENV: production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      user-db:
        condition: service_healthy
    expose:
      - "8081"
    networks:
      - private
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d users"]
      interval: 10s
      timeout: 5s
      retries: 10

  todo-service:
    build:
      context: ./todo-service
      dockerfile: Dockerfile
    environment:
      PORT: 8082
      DATABASE_URL: postgres://todo_todo:${TODO_DB_PASSWORD}@todo-db:5432/todos?sslmode=disable
      APP_ENV: production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      todo-db:
        condition: service_healthy
    expose:
      - "8082"
    networks:
      - private
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  todo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: todo_todo
      POSTGRES_PASSWORD: ${TODO_DB_PASSWORD}
    volumes:
      - todo_db_data:/var/lib/postgresql/data
    networks:
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_todo -d todos"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    expose:
      - "6379"
    networks:
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      nginx:
        condition: service_started
    expose:
      - "9113"
    networks:
      - public
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - public
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - public
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - public
      - private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  nginx_cache:
  user_db_data:
  todo_db_data:
  prometheus_data:
  grafana_data:

networks:
  public:
  private:
    internal: true
